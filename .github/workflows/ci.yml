name: SciCalc Pro — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── ETAPA 1: Lint ────────────────────────────────────────────────────────
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          cd backend
          pip install -e ".[dev]"
          pip install ruff

      - name: Ejecutar ruff
        run: |
          cd backend
          ruff check src/ --output-format=github

  # ─── ETAPA 2: Pruebas unitarias ───────────────────────────────────────────
  unit-tests:
    name: "Pruebas unitarias (pytest)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Ejecutar pruebas unitarias
        run: |
          cd backend
          pytest tests/unit/ -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
        # Nota: la cobertura de unit/ sola (~42%) se complementa con integration/

      - name: Subir reporte de cobertura (unit)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage.xml

  # ─── ETAPA 3: Pruebas de integración ─────────────────────────────────────
  integration-tests:
    name: "Pruebas de integración (pytest + PostgreSQL)"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: scicalc_test
          POSTGRES_USER: scicalc
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://scicalc:secret@localhost:5432/scicalc_test
      SECRET_KEY: "ci-test-secret-key-32-chars-minimum!!"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Aplicar migraciones
        run: |
          cd backend
          alembic upgrade head

      - name: Ejecutar pruebas de integración con cobertura combinada
        run: |
          cd backend
          pytest tests/unit/ tests/integration/ -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Subir reporte de cobertura combinado
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: backend/coverage.xml

  # ─── ETAPA 4: Pruebas E2E con Selenium ───────────────────────────────────
  e2e-tests:
    name: "Pruebas E2E (Selenium + Chrome)"
    runs-on: ubuntu-latest
    needs: integration-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: scicalc_e2e
          POSTGRES_USER: scicalc
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://scicalc:secret@localhost:5432/scicalc_e2e
      SECRET_KEY: "ci-test-secret-key-32-chars-minimum!!"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias Python
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Aplicar migraciones
        run: |
          cd backend
          alembic upgrade head

      - name: Arrancar servidor en background
        run: |
          cd backend
          python run.py &
          echo $! > /tmp/server.pid
          sleep 5
          curl --retry 5 --retry-delay 2 http://localhost:8000/health

      - name: Ejecutar pruebas E2E
        run: |
          cd backend
          pytest tests/e2e/ -v -m e2e

      - name: Detener servidor
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then kill $(cat /tmp/server.pid) || true; fi

  # ─── ETAPA 5: Análisis SonarQube ─────────────────────────────────────────
  sonarqube:
    name: "Análisis SonarQube"
    runs-on: ubuntu-latest
    needs: integration-tests
    # Solo en rama main o si SONAR_TOKEN está disponible
    if: ${{ vars.SONAR_HOST_URL != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube necesita historial completo para blame

      - name: Descargar reporte de cobertura combinado
        uses: actions/download-artifact@v4
        with:
          name: coverage-combined
          path: backend/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
