{% extends "base.html" %}
{% block title %}Iniciar Sesión — SciCalc Pro{% endblock %}
{% block heading %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="card">
    <form onsubmit="return false;">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" />

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Contraseña" />

        <button type="button" id="btn-login" class="btn btn-primary">Iniciar sesión</button>
    </form>

    <div id="result" class="mt-10"></div>

    <p class="mt-14 text-muted"><small>
        ¿No tienes cuenta? <a href="/web/register">Regístrate aquí</a>
    </small></p>
</div>

{% endblock %}

{% block scripts %}
<script>
    document.getElementById('btn-login').addEventListener('click', async function () {
        var email    = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var resultDiv = document.getElementById('result');
        resultDiv.textContent = '';
        resultDiv.className = 'mt-10';

        var body = new URLSearchParams();
        body.append('username', email);
        body.append('password', password);

        try {
            var resp = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString()
            });
            var data = await resp.json();

            if (resp.ok) {
                sessionStorage.setItem('access_token', data.access_token);
                resultDiv.textContent = 'Login exitoso';
                resultDiv.className += ' text-success';
            } else {
                var detail = data.detail
                    ? (typeof data.detail === 'object' ? JSON.stringify(data.detail) : data.detail)
                    : 'Error desconocido';
                resultDiv.textContent = 'Error: ' + detail;
                resultDiv.className += ' text-danger';
            }
        } catch (err) {
            resultDiv.textContent = 'Error: ' + err.message;
            resultDiv.className += ' text-danger';
        }
    });
</script>
{% endblock %}
